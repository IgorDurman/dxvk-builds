# This is a GitHub Actions file that builds artifacts for x86 and x64 DLLs separately.

name: Build DXVK Artifacts

on:
  push:
    branches:
      - main

jobs:
  build-x86:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Environment
        run: |
          sudo apt-get install -y build-essential

      - name: Build x86 DLLs
        run: |
          # Your build commands for x86 go here

      - name: Upload x86 Artifacts
        uses: actions/upload-artifact@v2
        with:
          name: x86-dlls
          path: path/to/x86.dll

  build-x64:
    runs-on: ubuntu-latest
    steps:
